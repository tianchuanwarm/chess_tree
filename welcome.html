<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>学习方法</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "楷体", "KaiTi", "STKaiti", "宋体", serif;
            background: #f5f0e8;
            background-image: 
                radial-gradient(ellipse at 20% 80%, rgba(139, 119, 101, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 80, 60, 0.06) 0%, transparent 50%);
            padding: 4vw 6vw;
            color: #3a3530;
            line-height: 2.2;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        h1 {
            font-size: 7vw;
            max-font-size: 40px;
            color: #cc0000;
            margin-bottom: 5vw;
            letter-spacing: 4px;
            text-align: center;
            border-bottom: 2px solid #c4b8a8;
            padding-bottom: 3vw;
        }

        h2 {
            font-size: 6vw;
            max-font-size: 32px;
            color: #4a3f35;
            margin: 6vw 0 3vw;
            letter-spacing: 2px;
            padding-left: 2vw;
            border-left: 4px solid #8b7355;
        }

        p {
            font-size: 5.5vw;
            max-font-size: 28px;
            margin-bottom: 2vw;
            text-align: justify;
        }

        .download-section {
            text-align: center;
            margin: 8vw 0;
            padding: 5vw;
            background: #e8e0d4;
            border-radius: 2vw;
            border: 2px solid #c4b8a8;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 2vw;
            padding: 3vw 8vw;
            background: linear-gradient(135deg, #5a4a3a 0%, #4a3f35 100%);
            color: #f0ebe0;
            text-decoration: none;
            border-radius: 1.5vw;
            font-size: 5vw;
            max-font-size: 24px;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(90, 74, 58, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #6a5a4a 0%, #5a4f45 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(90, 74, 58, 0.4);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        .download-icon {
            font-size: 6vw;
            max-font-size: 28px;
        }

        .download-text {
            font-weight: bold;
        }

        .download-tip {
            margin-top: 3vw;
            font-size: 4vw;
            max-font-size: 18px;
            color: #6a5f55;
        }

        @media (min-width: 600px) {
            body {
                padding: 3% 5%;
            }

            h1 {
                font-size: 35px;
                margin-bottom: 40px;
                padding-bottom: 25px;
            }

            h2 {
                font-size: 30px;
                margin: 40px 0 20px;
            }

            p {
                font-size: 30px;
            }

            .download-section {
                margin: 60px 0;
                padding: 30px;
            }

            .download-btn {
                padding: 20px 45px;
                font-size: 24px;
            }

            .download-icon {
                font-size: 28px;
            }

            .download-tip {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5vw 7vw;
                line-height: 2.0;
            }

            h1 {
                font-size: 6.5vw;
            }

            h2 {
                font-size: 5.5vw;
            }

            p {
                font-size: 5vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>学习象棋新工具 布局树三件套</h1>

        <h2>一、一步一图：精读深研</h2>
        <p>每步一图，适合逐着细读。关键局面先思考再往下看，效果远胜直接翻答案。</p>

        <h2>二、推演图：练脑内棋盘</h2>
        <p>纯文字棋谱，须在脑中构建局面——这正是"棋盘可视化"能力的训练，是棋力进阶的核心。</p>

        <h2>三、枝干图：抓整体脉络</h2>
        <p>只保留分支关键节点，删繁就简，突出布局主干。</p>

        <div class="download-section">
            <a href="yibuyitu.pdf" download class="download-btn">
                <span class="download-icon">📄</span>
                <span class="download-text">下载一步一图棋谱（PDF）</span>
            </a>
            <p class="download-tip">推荐使用福昕PDF阅读器打开，支持大纲搜索功能</p>
        </div>
    </div>
</body>
</html>
