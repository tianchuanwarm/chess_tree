<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布局树推演</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: "楷体", "KaiTi", "STKaiti", "宋体", serif;
            background: #f5f0e8;
            background-image: 
                radial-gradient(ellipse at 20% 80%, rgba(139, 119, 101, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 80, 60, 0.06) 0%, transparent 50%);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c2c2c 0%, #3d3d3d 50%, #2c2c2c 100%);
            color: #f0ebe0;
            padding: 14px 20px;
            text-align: center;
            border-bottom: 3px solid #5a4a3a;
            position: relative;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b7355, transparent);
        }

        .header h1 {
            font-size: 24px;
            font-weight: normal;
            letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .nav-bar {
            background: #e8e0d4;
            border-bottom: 2px solid #c4b8a8;
            flex-shrink: 0;
        }

        .nav-items {
            display: flex;
            justify-content: center;
        }

        .nav-item {
            flex: 1;
            max-width: 200px;
            padding: 14px 10px;
            text-align: center;
            color: #4a3f35;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-item:hover {
            background: #d4c8b8;
            color: #2c241c;
        }

        .nav-item.active {
            background: #c9bdad;
            color: #2c241c;
            font-weight: bold;
            border-bottom-color: #5a4a3a;
        }

        .nav-item .icon {
            font-size: 18px;
        }

        .content {
            flex: 1;
            position: relative;
            background: #f5f0e8;
            overflow: hidden;
        }

        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 18px;
                letter-spacing: 4px;
            }

            .nav-item {
                padding: 12px 5px;
                font-size: 14px;
                gap: 6px;
            }

            .nav-item .icon {
                font-size: 16px;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 15px;
                letter-spacing: 2px;
            }

            .nav-item {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>布 局 树 推 演</h1>
    </div>

    <div class="nav-bar">
        <div class="nav-items">
            <div class="nav-item active" onclick="navigateTo(this, 'welcome.html')">
                <span class="icon">📖</span>学习方法
            </div>
            <div class="nav-item" onclick="navigateTo(this, 'tuiyan_tree.html')">
                <span class="icon">🌿</span>推演图
            </div>
            <div class="nav-item" onclick="navigateTo(this, 'branch_tree.html')">
                <span class="icon">🎋</span>枝干图
            </div>
        </div>
    </div>

    <div class="content">
        <iframe id="content-frame" src="welcome.html"></iframe>
    </div>

    <script>
        function navigateTo(element, page) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            document.getElementById('content-frame').src = page;
        }
    </script>
</body>
</html>
