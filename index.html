<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>布局树推演</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: "楷体", "KaiTi", "STKaiti", "宋体", serif;
            background: #f5f0e8;
            background-image: 
                radial-gradient(ellipse at 20% 80%, rgba(139, 119, 101, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 80, 60, 0.06) 0%, transparent 50%);
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, #2c2c2c 0%, #3d3d3d 50%, #2c2c2c 100%);
            color: #f0ebe0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid #5a4a3a;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .header h1 {
            font-size: 22px;
            font-weight: normal;
            letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .nav-bar {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            height: 50px;
            background: #e8e0d4;
            border-bottom: 2px solid #c4b8a8;
            display: flex;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #4a3f35;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .nav-item:hover {
            background: #d4c8b8;
            color: #2c241c;
        }

        .nav-item.active {
            background: #c9bdad;
            color: #2c241c;
            font-weight: bold;
            border-bottom-color: #5a4a3a;
        }

        .nav-item .icon {
            font-size: 18px;
            margin-bottom: 2px;
        }

        .nav-item .label {
            font-size: 13px;
        }

        .content {
            position: absolute;
            top: 110px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f5f0e8;
            overflow: hidden;
        }

        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .header {
                height: 50px;
            }
            
            .header h1 {
                font-size: 18px;
                letter-spacing: 4px;
            }

            .nav-bar {
                top: 50px;
                height: 45px;
            }

            .nav-item .icon {
                font-size: 16px;
            }

            .nav-item .label {
                font-size: 12px;
            }

            .content {
                top: 95px;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 16px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>布 局 树 推 演</h1>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="navigateTo(this, 'welcome.html')">
            <span class="icon">📖</span>
            <span class="label">学习方法</span>
        </div>
        <div class="nav-item" onclick="navigateTo(this, 'tuiyan_tree.html')">
            <span class="icon">🌿</span>
            <span class="label">推演图</span>
        </div>
        <div class="nav-item" onclick="navigateTo(this, 'branch_tree.html')">
            <span class="icon">🎋</span>
            <span class="label">枝干图</span>
        </div>
    </div>

    <div class="content">
        <iframe id="content-frame" src="welcome.html"></iframe>
    </div>

    <script>
        function navigateTo(element, page) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            document.getElementById('content-frame').src = page;
        }
    </script>
</body>
</html>
